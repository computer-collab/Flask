<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employees</title>
    <style>
        #ProfilePic {
            /* color: blueviolet; */
            background-color: blueviolet;
        }

        #PreviewBackground {
            height: 100vh;
            width: 100vw;
            display: none;
            background-color: rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin/employees/add_employees.css') }}">

<body>
    <h1>Add Employees</h1>
    <form>
        <label for="ProfilePic">Profile Picture : </label>
        <input id="ProfilePicInput" type="file" hidden>
        <button id="ProfilePic" type="button">Choose Picture </button><br>
        <span id="FileName"></span> <button id="PreviewPicButton" type="button">Preview Image</button>
        
        <br>
        <label for="NameBox">Name:</label>
        <input type="text" id="NameBox" name="NameBox"><br><br>
        <label for="EmailBox">Email:</label>
        <input type="text" id="EmailBox" name="EmailBox"><br><br>
        <label for="WorkerTypeBox">Worker Type:</label>
        <input type="text" id="WorkerTypeBox" name="WorkerTypeBox"><br><br>

        <div id="SelectorBox">
            <select name="WorkerType" id="WorkerType">
                <option value="admin">Admin</option>
                <option value="others">Others</option>
            </select>
            <div id="OthershelperDiv" hidden><input id="Others">
                <button type="button" id="othersbutton">Submit</button>
            </div>
        </div>


        <div id="message"></div>

        
    </form>
    </div>
    <input type="submit" value="Submit">
    <button type="button" onclick="clicked()">Back</button>
    <div id="PreviewBackground" hidden>
            <div id="PreviewForeground">
                <img alt = "preview image"id="Preview" width="500">
            </div>
        </div>
    <script src="{{ url_for('static', filename='logic/admin/employees/add_employees.js') }}"></script>
</body>

</html>
