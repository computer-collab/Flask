[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "myproject"
version = "0.1.0"
description = "A sample project with multiple SQLite DBs"
authors = [
    { name="Rahul", email="your_email@example.com" }
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "Flask>=2.3",
    "Flask-SQLAlchemy>=3.0"
]

[tool.setuptools.packages.find]
where = ["Flask"]
